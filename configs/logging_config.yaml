version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s:%(funcName)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json: 
    class: pythonjsonlogger.jsonlogger.JsonFormatter
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout

  file_all:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/app.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

  file_error:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: standard
    filename: logs/error.log
    maxBytes: 10485760
    backupCount: 10
    encoding: utf-8

loggers:
  clients:      
    level: INFO
    handlers: [console, file_all, file_error]
    propagate: false
  agent:
    level: INFO
    handlers: [console, file_all, file_error]
    propagate: false
  gui.window:
    level: DEBUG
    handlers: [console, file_all, file_error]
    propagate: false
  gui.worker:
    level: DEBUG
    handlers: [console, file_all, file_error]
    propagate: false
  gui.chat_display:
    level: DEBUG
    handlers: [console, file_all, file_error]
    propagate: false
  gui.input_bar:
    level: DEBUG
    handlers: [console, file_all, file_error]
    propagate: false

root:
  level: WARNING  
  handlers: [console, file_all, file_error]